<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1">

    <title>

        Student Dashboard

    </title>

    <link rel="stylesheet"
          href="css/dashboard.css">

</head>

<body>

    <section class="profile-card">

    <div class="profile-left">

       <div class="profile-avatar"
     id="avatar">

    NS

</div>

<div>

    <h2 id="studentName">

        Loading...

    </h2>

    <p id="studentId">

        Loading...

    </p>

</div>
    </div>

    <div class="profile-right">

        Active Student

    </div>

</section>


<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <img src="images/logo.png"
     class="sidebar-logo">


        <h2>

            Student Portal

        </h2>

       <nav>

    <a href="dashboard.html">

        Dashboard

    </a>

    <a href="qualifications.html"
       class="active">

        Qualifications

    </a>

    <a href="assignments.html">

        Assignments

    </a>

    <a href="results.html">

        Results

    </a>

    <a href="certificates.html">

        Certificates

    </a>

    <a href="messages.html">

        Messages

    </a>

    <a href="settings.html">

        Settings

    </a>

    <a href="#"
   onclick="logout()">

    Logout

</a>

</nav>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <header>

    <h1>
        My Qualifications
    </h1>

</header>

<section class="stats-grid">

    <div class="stat-card">

        <h3>
            Active Qualifications
        </h3>

        <span>3</span>

    </div>

    <div class="stat-card">

        <h3>
            Completed Modules
        </h3>

        <span>12</span>

    </div>

</section>

        <section class="dashboard-grid">

    <div class="dashboard-panel">

        <h3>

            Recent Activity

        </h3>

    </div>

    <div class="dashboard-panel">

        <h3>

            Notifications

        </h3>

    </div>

</section>

    </main>

</div>

<script>

const token =
localStorage.getItem("token");

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!token || !user){

    window.location.href =
    "login.html";

}

const studentName =
user.full_name ||
user.fullName;

const studentId =
user.student_id ||
user.studentId;

document
.getElementById(
"studentName"
)
.innerText =
studentName;

function logout(){

    localStorage.clear();

    window.location.href =
    "login.html";

}

document
.getElementById(
"studentId"
)
.innerText =
"Student ID: "
+
studentId;

document
.getElementById(
"avatar"
)
.innerText =
studentName
.split(" ")
.map(
name =>
name[0]
)
.join("")
.toUpperCase();

</script>

</body>

</html>
