<!DOCTYPE html>
<html lang="en">

<head>



<link rel="stylesheet"
      href="css/login.css">




</head>

<body>

<section class="portal-login">

    <div class="login-box">

        <img src="../images/logo.png"
             class="login-logo">

       <h1>
               Student<br>
               Portal
            </h1>


        <p>

            Sign in to continue

        </p>

        <form id="loginForm">

    <input
        id="email"
        type="email"
        placeholder="Email"
        required>

    <input
        id="password"
        type="password"
        placeholder="Password"
        required>

    <button type="submit">

        Login

    </button>

</form>

        <div class="portal-links">

    
   <a href="forgot-password.html">
    Forgot Password?
</a>


    <p class="register-link">

    Don't have an account?

    <a href="register.html">

        Register Now

    </a>

</p>

    <a href="register.html"
       class="register-link">

        Register Now

    </a>

</div>

    </div>

</section>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const response = await fetch("https://icm-website-test-production.up.railway.app/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
            alert("Login Successful");
            window.location.href = "dashboard.html";
        } else {
            alert(data.message);
        }
    } catch (error) {
        console.log(error);
        alert("Cannot connect to server.");
    }
});

</script>

</body>
