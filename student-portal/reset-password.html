<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<link rel="stylesheet"
href="css/login.css">

</head>

<body>

<div class="login-container">

<div class="login-card">

<img src="images/logo.png"
class="login-logo">

<h1>Set New Password</h1>

<p>
Enter your new password.
</p>

<form id="resetForm">

<input
id="password"
type="password"
placeholder="New Password"
required>

<button type="submit">
Reset Password
</button>

</form>

</div>

</div>

<script>

document
.getElementById(
"resetForm"
)
.addEventListener(
"submit",
async function(e){

e.preventDefault();

const params =
new URLSearchParams(
window.location.search
);

const token =
params.get("token");

const password =
document
.getElementById(
"password"
)
.value;

try{

const response =
await fetch(

"https://icm-website-test-production.up.railway.app/api/auth/reset-password",

{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

token,
password

})

}

);

const data =
await response.json();

alert(
data.message
);

if(response.ok){

window.location =
"login.html";

}

}
catch(err){

alert(
"Server error"
);

}

});

</script>

</body>
</html>
