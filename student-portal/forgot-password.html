<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Reset Password

    </title>

    <link rel="stylesheet"
          href="css/login.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <img src="images/logo.png"
                 class="login-logo">

            <h1>

                Reset Password

            </h1>

            <p>

                Enter your registered email address.

            </p>

           <form id="forgotForm">

    <input
        id="email"
        type="email"
        placeholder="Enter your email"
        required>

    <button type="submit">

        Send Reset Link

    </button>

</form>
            <p class="register-link">

                Remembered your password?

                <a href="login.html">

                    Back to Login

                </a>

            </p>

        </div>

    </div>



<script>

document
.getElementById("forgotForm")
.addEventListener(
"submit",
async function(e){

e.preventDefault();

const email =
document
.getElementById("email")
.value;

try{

const response =
await fetch(
"https://icm-website-test-production.up.railway.app/api/auth/forgot-password",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email
})
}
);


let data = {};

try{
    data = await response.json();
}
catch{
    alert("Server returned invalid response");
    return;
}

if(data.resetLink){

alert(
"Email service unavailable.\n\nPassword reset page will open now."
);

window.open(
data.resetLink,
"_blank"
);

return;
}

alert(data.message);

}
catch(error){

alert(
"Cannot connect to server"
);

}

});

</script>


</body>

</html>
