<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Reset Password

    </title>

    <link rel="stylesheet"
          href="css/login.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <img src="images/logo.png"
                 class="login-logo">

            <h1>

                Reset Password

            </h1>

            <p>

                Enter your registered email address.

            </p>

            <form action="login.html">

                <input type="email"
                       placeholder="Enter your email"
                       required>

                <button type="submit">

                    Send Reset Link

                </button>

            </form>

            <p class="register-link">

                Remembered your password?

                <a href="login.html">

                    Back to Login

                </a>

            </p>

        </div>

    </div>

</body>

</html>
